<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>3D Mobile Farming - Landscape Edition</title>
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    
    <style>
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; user-select: none; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; }

        /* ================= KUNCI LANDSCAPE WARNING ================= */
        /* Jika HP Portrait, layar ini akan menutupi game */
        #landscape-warning {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #1a252f; color: white; z-index: 99999;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            text-align: center; padding: 20px;
        }
        /* Jika HP sudah miring (Landscape), sembunyikan peringatan */
        @media screen and (orientation: landscape) {
            #landscape-warning { display: none !important; }
        }

        /* ================= STYLE MAIN MENU ================= */
        #menu-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            z-index: 10000; display: flex; flex-direction: column;
            justify-content: center; align-items: center; color: white;
        }
        .btn-start {
            padding: 14px 40px; font-size: 16px; font-weight: bold; color: #fff;
            background: #4caf50; border: none; border-radius: 50px; cursor: pointer;
        }

        /* ================= GAMEPAD UI (LANDSCAPE OPTIMIZED) ================= */
        /* Wadah D-Pad di Kiri Bawah */
        #dpad-zone {
            position: absolute; bottom: 15px; left: 20px;
            width: 130px; height: 130px; z-index: 999;
            display: grid; grid-template-columns: repeat(3, 1fr); grid-template-rows: repeat(3, 1fr);
        }
        .dbtn {
            background: rgba(44, 62, 80, 0.8); border: 2px solid rgba(255,255,255,0.4);
            color: white; font-weight: bold; font-size: 18px; display: flex;
            justify-content: center; align-items: center; border-radius: 8px;
        }
        .dbtn:active { background: #fff; color: #000; }

        /* Tombol Interaksi di Kanan Bawah */
        #action-btn {
            position: absolute; bottom: 25px; right: 30px;
            width: 85px; height: 85px; background: #e74c3c;
            border: 4px solid #fff; border-radius: 50%; z-index: 999;
            color: white; font-weight: bold; font-size: 11px; display: none;
            justify-content: center; align-items: center; text-align: center;
        }
        #action-btn.active-target { background: #2ecc71; display: flex; }

        /* ================= MODAL TOKO ================= */
        .modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6); z-index: 9999; display: none;
            justify-content: center; align-items: center; padding: 10px;
        }
        .modal-content { background: white; width: 100%; max-width: 320px; padding: 15px; border-radius: 15px; text-align: center; }
        .shop-item { display: flex; justify-content: space-between; align-items: center; background: #f8f9fa; padding: 8px; margin: 5px 0; border-radius: 8px; font-weight: bold; }
        .btn-buy { background: #2ecc71; color: white; border: none; padding: 4px 10px; border-radius: 4px; }
        .btn-close { background: #7f8c8d; color: white; border: none; padding: 8px; width: 100%; border-radius: 8px; margin-top: 5px; }
    </style>
</head>
<body>

    <div id="landscape-warning">
        <h2>🔄 Sila Miringkan HP Anda</h2>
        <p>Game ini didesain khusus untuk mode Landscape (Miring) agar kontrol gamepad muncul dengan sempurna.</p>
    </div>

    <div id="menu-screen">
        <h2 style="margin-bottom: 5px;">🌱 Megafarm 3D Mobile</h2>
        <p style="font-size: 12px; opacity: 0.7; margin-bottom: 20px;">Landscape Native Engine v2.5</p>
        <button class="btn-start" onclick="mulaiGame()">MULAI BERMAIN</button>
    </div>

    <div id="dpad-zone">
        <div></div>
        <div class="dbtn" id="btn-up">▲</div>
        <div></div>
        <div class="dbtn" id="btn-left">◀</div>
        <div style="background: rgba(0,0,0,0.2); border-radius:8px;"></div>
        <div class="dbtn" id="btn-right">▶</div>
        <div></div>
        <div class="dbtn" id="btn-down">▼</div>
        <div></div>
    </div>

    <div id="action-btn" onclick="triggerActionButton()">INTERAKSI</div>

    <div id="shop-modal" class="modal">
        <div class="modal-content">
            <h3>🛒 Kedai Buah Segar</h3>
            <div class="shop-item"><span>🍎 Apel Manis</span><button class="btn-buy" onclick="beliBuah('Apel', 15)">🪙15</button></div>
            <div class="shop-item"><span>🍊 Jeruk Segar</span><button class="btn-buy" onclick="beliBuah('Jeruk', 25)">🪙25</button></div>
            <button class="btn-close" onclick="tutupToko()">Kembali</button>
        </div>
    </div>

    <a-scene vr-mode-ui="enabled: false">
        
        <a-entity id="rig" position="0 0 5">
            <a-camera id="camera" look-controls="touchEnabled: true; magicWindowTrackingEnabled: false">
                <a-cursor visible="false"></a-cursor>
            </a-camera>
        </a-entity>

        <a-entity id="ui-koin" text="value: KOIN: 20; color: #ffffff; align: center; width: 5" position="0 2.2 -2.5"></a-entity>
        <a-entity id="ui-tas" text="value: BAG: 0 Wrt | 0 Buah; color: #ffeb3b; align: center; width: 4" position="0 1.8 -2.5"></a-entity>

        <a-sky color="#a6d5fa"></a-sky> 
        <a-plane position="0 -0.5 0" rotation="-90 0 0" width="100" height="100" color="#55a630"></a-plane> 

        <a-entity id="zone-lahan" position="0 0 0">
            <a-box id="plot-tanah" position="0 -0.4 0" width="2" height="0.2" depth="2" color="#8d6e63"></a-box>
            <a-cylinder id="plant-model" position="0 0.2 0" radius="0.12" height="0.6" color="#4caf50" scale="0 0 0"></a-cylinder>
            <a-entity text="value: LAHAN WORTEL; color: #ffffff; align: center; width: 3" position="0 0.8 0"></a-entity>
        </a-entity>

        <a-entity id="zone-toko" position="3 0 -2">
            <a-box position="0 0.5 0" width="1.5" height="1.8" depth="1.5" color="#2980b9"></a-box>
            <a-entity text="value: TOKO BUAH; color: #ffffff; align: center; width: 4" position="0 1.6 0"></a-entity>
        </a-entity>

        <a-entity id="zone-jual" position="-3 0 -2">
            <a-box position="0 0.4 0" width="1.2" height="1.2" depth="1.2" color="#ffb300"></a-box>
            <a-entity text="value: BURSA EKSPOR; color: #000000; align: center; width: 4" position="0 1.3 0"></a-entity>
        </a-entity>

    </a-scene>

    <script>
        let koin = 20; let wortelDiTas = 0; let buahLainDiTas = 0;
        let statusLahan = 'kosong'; let progresTumbuh = 0;
        let objekTerdekat = null;

        // Flags arah pergerakan D-Pad
        let keys = { up: false, down: false, left: false, right: false };

        function mulaiGame() {
            document.getElementById('menu-screen').remove();
            
            // Loop pendeteksi gerak & jarak
            setInterval(() => {
                cekJarakObjekKamera();
                updatePergerakanPlayer();
            }, 30);
            
            setupDpadSistem();
        }

        // ================= SISTEM EVENT DETEKSI REKAYASA TOMBOL D-PAD =================
        function setupDpadSistem() {
            const bindBtn = (id, keyName) => {
                const el = document.getElementById(id);
                el.addEventListener('touchstart', (e) => { e.preventDefault(); keys[keyName] = true; });
                el.addEventListener('touchend', () => { keys[keyName] = false; });
            };

            bindBtn('btn-up', 'up');
            bindBtn('btn-down', 'down');
            bindBtn('btn-left', 'left');
            bindBtn('btn-right', 'right');
        }

        function updatePergerakanPlayer() {
            let moveX = 0; let moveZ = 0;
            if (keys.up) moveZ = -1;
            if (keys.down) moveZ = 1;
            if (keys.left) moveX = -1;
            if (keys.right) moveX = 1;

            if (moveX === 0 && moveZ === 0) return;

            let rig = document.getElementById('rig');
            let camera = document.getElementById('camera');
            let currentPos = rig.getAttribute('position');
            
            let rotation = camera.getAttribute('rotation');
            let angle = (rotation.y * Math.PI) / 180;

            let speed = 0.07; 
            let dx = moveX * Math.cos(angle) + moveZ * Math.sin(angle);
            let dz = -moveX * Math.sin(angle) + moveZ * Math.cos(angle);

            rig.setAttribute('position', {
                x: currentPos.x + dx * speed,
                y: currentPos.y,
                z: currentPos.z + dz * speed
            });
        }

        // ================= JARAK & AKSI =================
        function cekJarakObjekKamera() {
            let playerPos = document.getElementById('rig').getAttribute('position');
            let actionBtn = document.getElementById('action-btn');

            let jarakKeLahan = hitungJarak(playerPos, {x: 0, z: 0});
            let jarakKeToko  = hitungJarak(playerPos, {x: 3, z: -2});
            let jarakKeJual  = hitungJarak(playerPos, {x: -3, z: -2});

            if (jarakKeLahan < 2.2) {
                objekTerdekat = 'lahan';
                actionBtn.innerText = statusLahan === 'kosong' ? "TANAM SEED" : (statusLahan === 'matang' ? "PANEN WORTEL" : "TUMBUH...");
                actionBtn.className = "active-target";
            } else if (jarakKeToko < 2.2) {
                objekTerdekat = 'toko'; actionBtn.innerText = "BUKA TOKO"; actionBtn.className = "active-target";
            } else if (jarakKeJual < 2.2) {
                objekTerdekat = 'jual'; actionBtn.innerText = "JUAL SEMUA"; actionBtn.className = "active-target";
            } else {
                objekTerdekat = null; actionBtn.className = "";
            }
        }

        function hitungJarak(p1, p2) { return Math.sqrt(Math.pow(p1.x - p2.x, 2) + Math.pow(p1.z - p2.z, 2)); }

        function triggerActionButton() {
            if (!objekTerdekat) return;
            if (objekTerdekat === 'lahan') eksekusiLahanPertanian();
            else if (objekTerdekat === 'toko') document.getElementById('shop-modal').style.display = 'flex';
            else if (objekTerdekat === 'jual') eksekusiPasarJual();
        }

        function eksekusiLahanPertanian() {
            let plant = document.getElementById('plant-model');
            let plot = document.getElementById('plot-tanah');

            if (statusLahan === 'kosong') {
                if (koin < 5) return alert("Koin tidak cukup!");
                koin -= 5; statusLahan = 'tumbuh'; progresTumbuh = 0; updateUI();
                plot.setAttribute('color', '#5d4037');
                plant.setAttribute('scale', '1 0.1 1');
                plant.setAttribute('color', '#4caf50');

                let timer = setInterval(() => {
                    progresTumbuh += 25;
                    plant.setAttribute('scale', `1 ${0.1 + (progresTumbuh/100)*0.9} 1`);
                    if (progresTumbuh >= 100) {
                        clearInterval(timer); statusLahan = 'matang';
                        plant.setAttribute('color', '#ff9800');
                        cekJarakObjekKamera();
                    }
                }, 1000);
            } 
            else if (statusLahan === 'matang') {
                wortelDiTas++; statusLahan = 'kosong';
                plant.setAttribute('scale', '0 0 0'); plot.setAttribute('color', '#8d6e63');
                updateUI(); sigCekJarakObjekKamera();
            }
        }

        function beliBuah(namaBuah, harga) {
            if (koin < harga) return alert("Koin tidak cukup!");
            koin -= harga; buahLainDiTas++; updateUI();
            alert(`Membeli 1 ${namaBuah}!`);
        }
        function tutupToko() { document.getElementById('shop-modal').style.display = 'none'; }

        function eksekusiPasarJual() {
            if (wortelDiTas === 0 && buahLainDiTas === 0) return alert("Tas kosong!");
            let totalDuit = (wortelDiTas * 12) + (buahLainDiTas * 35);
            koin += totalDuit; wortelDiTas = 0; buahLainDiTas = 0;
            updateUI(); cekJarakObjekKamera();
            alert(`Terjual! +🪙${totalDuit} Koin.`);
        }

        function updateUI() {
            document.getElementById('ui-koin').setAttribute('text', `value: KOIN: ${koin}; color: #ffffff; align: center; width: 5`);
            document.getElementById('ui-tas').setAttribute('text', `value: BAG: ${wortelDiTas} Wrt | ${buahLainDiTas} Buah; color: #ffeb3b; align: center; width: 4`);
        }
    </script>
</body>
</html>
