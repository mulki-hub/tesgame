<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>3D Mobile Farming RPG v2.5</title>
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    
    <style>
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; user-select: none; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; }

        /* ================= STYLE MAIN MENU ================= */
        #menu-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            z-index: 10000; display: flex; flex-direction: column;
            justify-content: center; align-items: center; color: white; text-align: center;
        }
        .menu-title { font-size: 36px; font-weight: 800; text-shadow: 0 4px 10px rgba(0,0,0,0.3); margin-bottom: 5px; }
        .menu-subtitle { font-size: 14px; opacity: 0.8; margin-bottom: 40px; }
        .btn-start {
            padding: 16px 45px; font-size: 18px; font-weight: bold; color: #fff;
            background: #4caf50; border: none; border-radius: 50px; cursor: pointer;
            box-shadow: 0 8px 20px rgba(76, 175, 80, 0.4);
        }

        /* ================= PURE PWA JOYSTICK (ANTI-GAGAL) ================= */
        /* Wadah Analog Luar */
        #joystick-zone {
            position: absolute; bottom: 40px; left: 40px;
            width: 120px; height: 120px; background: #2c3e50;
            border: 4px solid #bdc3c7; border-radius: 50%;
            z-index: 999; touch-action: none; box-shadow: 0 8px 15px rgba(0,0,0,0.4);
        }
        /* Tombol Pin Tengah Analog */
        #joystick-button {
            position: absolute; width: 50px; height: 50px;
            background: #ffffff; border-radius: 50%;
            top: 31px; left: 31px; box-shadow: 0 4px 8px rgba(0,0,0,0.3);
            transition: transform 0.05s linear;
        }

        /* Tombol Aksi Kanan Bawah */
        #action-btn {
            position: absolute; bottom: 55px; right: 55px;
            width: 95px; height: 95px; background: #e74c3c;
            border: 4px solid #fff; border-radius: 50%; z-index: 999;
            color: white; font-weight: bold; font-size: 13px; display: flex;
            justify-content: center; align-items: center; text-align: center;
            box-shadow: 0 8px 15px rgba(0,0,0,0.4); touch-action: none;
            display: none;
        }
        #action-btn.active-target { background: #2ecc71; animation: pulse 1s infinite; display: flex; }

        /* ================= POPUP MODAL TOKO ================= */
        .modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6); z-index: 9999; display: none;
            justify-content: center; align-items: center; padding: 20px;
        }
        .modal-content {
            background: white; width: 100%; max-width: 340px; padding: 20px;
            border-radius: 20px; text-align: center;
        }
        .shop-item {
            display: flex; justify-content: space-between; align-items: center;
            background: #f8f9fa; padding: 10px 15px; margin: 10px 0; border-radius: 12px;
            font-weight: bold;
        }
        .btn-buy { background: #2ecc71; color: white; border: none; padding: 6px 12px; border-radius: 6px; font-weight: bold; }
        .btn-close { background: #7f8c8d; color: white; border: none; padding: 10px; width: 100%; border-radius: 10px; font-weight: bold; margin-top: 10px; }

        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.06); } 100% { transform: scale(1); } }
    </style>
</head>
<body>

    <div id="menu-screen">
        <div class="menu-title">🌱 Megafarm 3D Mobile</div>
        <div class="menu-subtitle">Edisi Custom Native Engine (Anti-Stuck GitHub)</div>
        <button class="btn-start" onclick="mulaiGame()">MULAI BERMAIN</button>
    </div>

    <div id="joystick-zone">
        <div id="joystick-button"></div>
    </div>

    <div id="action-btn" onclick="triggerActionButton()">INTERAKSI</div>

    <div id="shop-modal" class="modal">
        <div class="modal-content">
            <h3 style="color:#2c3e50; margin-bottom:5px;">🛒 Kedai Buah Segar</h3>
            <p style="font-size:12px; color:#7f8c8d; margin-bottom:15px;">Beli buah matang menggunakan koinmu</p>
            
            <div class="shop-item">
                <span>🍎 Apel Manis</span>
                <button class="btn-buy" onclick="beliBuah('Apel', 15)">🪙15</button>
            </div>
            <div class="shop-item">
                <span>🍊 Jeruk Segar</span>
                <button class="btn-buy" onclick="beliBuah('Jeruk', 25)">🪙25</button>
            </div>

            <button class="btn-close" onclick="tutupToko()">Kembali ke Lahan</button>
        </div>
    </div>

    <a-scene vr-mode-ui="enabled: false">
        
        <a-entity id="rig" position="0 0 5">
            <a-camera id="camera" look-controls="touchEnabled: true">
                <a-cursor visible="false"></a-cursor>
            </a-camera>
        </a-entity>

        <a-entity id="ui-koin" text="value: KOIN: 20; color: #ffffff; align: center; width: 6" position="0 3.5 -3" scale="1.4 1.4 1.4"></a-entity>
        <a-entity id="ui-tas" text="value: BAG: 0 Wrt | 0 Buah; color: #ffeb3b; align: center; width: 5" position="0 2.8 -3"></a-entity>

        <a-sky color="#a6d5fa"></a-sky> 
        <a-plane position="0 -0.5 0" rotation="-90 0 0" width="100" height="100" color="#55a630"></a-plane> 

        <a-entity id="zone-lahan" position="0 0 0">
            <a-box id="plot-tanah" position="0 -0.4 0" width="2" height="0.2" depth="2" color="#8d6e63"></a-box>
            <a-cylinder id="plant-model" position="0 0.2 0" radius="0.12" height="0.6" color="#4caf50" scale="0 0 0"></a-cylinder>
            <a-entity text="value: LAHAN WORTEL; color: #ffffff; align: center; width: 3" position="0 0.8 0"></a-entity>
        </a-entity>

        <a-entity id="zone-toko" position="3 0 -2">
            <a-box position="0 0.5 0" width="1.5" height="1.8" depth="1.5" color="#2980b9"></a-box>
            <a-box position="0 0.6 0.8" width="0.8" height="0.8" depth="0.1" color="#f1c40f"></a-box>
            <a-entity text="value: TOKO BUAH SEGAR; color: #ffffff; align: center; width: 4" position="0 2 0"></a-entity>
        </a-entity>

        <a-entity id="zone-jual" position="-3 0 -2">
            <a-box position="0 0.4 0" width="1.2" height="1.2" depth="1.2" color="#ffb300"></a-box>
            <a-entity text="value: BURSA EKSPOR\n(Jual Hasil Tani); color: #000000; align: center; width: 4" position="0 1.5 0"></a-entity>
        </a-entity>

    </a-scene>

    <script>
        let koin = 20; let wortelDiTas = 0; let buahLainDiTas = 0;
        let statusLahan = 'kosong'; let progresTumbuh = 0;
        let objekTerdekat = null;

        // Variabel untuk pergerakan Analog buatan sendiri
        let moveX = 0; let moveZ = 0;
        let isMoving = false;

        function mulaiGame() {
            document.getElementById('menu-screen').remove();
            
            // Interval utama game untuk deteksi jarak & pergerakan kamera player
            setInterval(() => {
                cekJarakObjekKamera();
                updatePergerakanPlayer();
            }, 30);
            
            setupAnalogSistem();
        }

        // ================= SISTEM ENGINE ANALOG MANUAL REKAYASA (NATIVE) =================
        function setupAnalogSistem() {
            const zone = document.getElementById('joystick-zone');
            const btn = document.getElementById('joystick-button');
            const maxRadius = 35; // Batas tombol analog bisa digeser dalam pixel

            zone.addEventListener('touchstart', handleTouch);
            zone.addEventListener('touchmove', handleTouch);
            zone.addEventListener('touchend', () => {
                btn.style.transform = `translate(0px, 0px)`;
                moveX = 0; moveZ = 0; isMoving = false;
            });

            function handleTouch(e) {
                e.preventDefault();
                const touch = e.touches[0];
                const rect = zone.getBoundingClientRect();
                const centerX = rect.left + rect.width / 2;
                const centerY = rect.top + rect.height / 2;

                // Hitung seberapa jauh jempol dari titik tengah analog
                let deltaX = touch.clientX - centerX;
                let deltaY = touch.clientY - centerY;
                let distance = Math.sqrt(deltaX*deltaX + deltaY*deltaY);

                if (distance > maxRadius) {
                    deltaX = (deltaX / distance) * maxRadius;
                    deltaY = (deltaY / distance) * maxRadius;
                }

                // Geser pin putih secara visual
                btn.style.transform = `translate(${deltaX}px, ${deltaY}px)`;

                // Ubah ke arah matematika vektor pergerakan 3D
                moveX = deltaX / maxRadius;
                moveZ = deltaY / maxRadius;
                isMoving = true;
            }
        }

        // Jalankan pergerakan kamera berdasarkan input koordinat analog
        function updatePergerakanPlayer() {
            if (!isMoving) return;

            let rig = document.getElementById('rig');
            let camera = document.getElementById('camera');
            let currentPos = rig.getAttribute('position');
            
            // Ambil rotasi sudut kamera saat ini agar arah "Maju" selalu sesuai arah pandangan mata player
            let rotation = camera.getAttribute('rotation');
            let angle = (rotation.y * Math.PI) / 180;

            let speed = 0.08; // Kecepatan jalan player
            
            // Rumus Trigonometri Vektor arah pergerakan kamera
            let dx = moveX * Math.cos(angle) + moveZ * Math.sin(angle);
            let dz = -moveX * Math.sin(angle) + moveZ * Math.cos(angle);

            rig.setAttribute('position', {
                x: currentPos.x + dx * speed,
                y: currentPos.y,
                z: currentPos.z + dz * speed
            });
        }

        // ================= DETEKSI JARAK INTERAKSI OBJEK =================
        function cekJarakObjekKamera() {
            let playerPos = document.getElementById('rig').getAttribute('position');
            let actionBtn = document.getElementById('action-btn');

            let jarakKeLahan = hitungJarak(playerPos, {x: 0, z: 0});
            let jarakKeToko  = hitungJarak(playerPos, {x: 3, z: -2});
            let jarakKeJual  = hitungJarak(playerPos, {x: -3, z: -2});

            if (jarakKeLahan < 2.2) {
                objekTerdekat = 'lahan';
                actionBtn.innerText = statusLahan === 'kosong' ? "TANAM SEED" : (statusLahan === 'matang' ? "PANEN WORTEL" : "MENUNGGU...");
                actionBtn.className = "active-target";
            } else if (jarakKeToko < 2.2) {
                objekTerdekat = 'toko';
                actionBtn.innerText = "BUKA TOKO";
                actionBtn.className = "active-target";
            } else if (jarakKeJual < 2.2) {
                objekTerdekat = 'jual';
                actionBtn.innerText = "JUAL SEMUA";
                actionBtn.className = "active-target";
            } else {
                objekTerdekat = null;
                actionBtn.className = "";
            }
        }

        function hitungJarak(p1, p2) { return Math.sqrt(Math.pow(p1.x - p2.x, 2) + Math.pow(p1.z - p2.z, 2)); }

        function triggerActionButton() {
            if (!objekTerdekat) return;
            if (objekTerdekat === 'lahan') eksekusiLahanPertanian();
            else if (objekTerdekat === 'toko') document.getElementById('shop-modal').style.display = 'flex';
            else if (objekTerdekat === 'jual') eksekusiPasarJual();
        }

        function eksekusiLahanPertanian() {
            let plant = document.getElementById('plant-model');
            let plot = document.getElementById('plot-tanah');

            if (statusLahan === 'kosong') {
                if (koin < 5) return alert("Koin tidak cukup!");
                koin -= 5; statusLahan = 'tumbuh'; progresTumbuh = 0; updateUI();

                plot.setAttribute('color', '#5d4037');
                plant.setAttribute('scale', '1 0.1 1');
                plant.setAttribute('color', '#4caf50');

                let timer = setInterval(() => {
                    progresTumbuh += 25;
                    plant.setAttribute('scale', `1 ${0.1 + (progresTumbuh/100)*0.9} 1`);
                    if (progresTumbuh >= 100) {
                        clearInterval(timer); statusLahan = 'matang';
                        plant.setAttribute('color', '#ff9800');
                        cekJarakObjekKamera();
                    }
                }, 1000);
            } 
            else if (statusLahan === 'matang') {
                wortelDiTas++; statusLahan = 'kosong';
                plant.setAttribute('scale', '0 0 0');
                plot.setAttribute('color', '#8d6e63');
                updateUI(); cekJarakObjekKamera();
            }
        }

        function beliBuah(namaBuah, harga) {
            if (koin < harga) return alert("Koin tidak cukup!");
            koin -= harga; buahLainDiTas++; updateUI();
            alert(`Membeli 1 ${namaBuah}!`);
        }
        function tutupToko() { document.getElementById('shop-modal').style.display = 'none'; }

        function eksekusiPasarJual() {
            if (wortelDiTas === 0 && buahLainDiTas === 0) return alert("Tas kosong!");
            let totalDuit = (wortelDiTas * 12) + (buahLainDiTas * 35);
            koin += totalDuit; wortelDiTas = 0; buahLainDiTas = 0;
            updateUI(); cekJarakObjekKamera();
            alert(`Terjual! +🪙${totalDuit} Koin.`);
        }

        function updateUI() {
            document.getElementById('ui-koin').setAttribute('text', `value: KOIN: ${koin}; color: #ffffff; align: center; width: 6`);
            document.getElementById('ui-tas').setAttribute('text', `value: BAG: ${wortelDiTas} Wrt | ${buahLainDiTas} Buah; color: #ffeb3b; align: center; width: 5`);
        }
    </script>
</body>
</html>
